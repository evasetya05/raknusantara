services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: raknusantara_db
      POSTGRES_USER: raknusantara_user
      POSTGRES_PASSWORD: '@Pontianak123'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raknusantara_user -d raknusantara_db"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8004:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=True
      - DB_NAME=raknusantara_db
      - DB_USER=raknusantara_user
      - DB_PASSWORD=@Pontianak123
      - DB_HOST=db
      - DB_PORT=5432
    restart: always

volumes:
  postgres_data:
